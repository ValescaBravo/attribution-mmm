<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attribution & Mix Modeling - Interactive Guide | Valesca Bravo Lab</title>
  <!-- Google Fonts: DM Serif Display, DM Sans, DM Mono -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Tailwind CDN (lightweight utility) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ----- CUSTOM BRAND SYSTEM (no purple gradient, no Inter) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #09071a;  /* navy dark background – matches lab's dark theme (power BI / excel style) */
      color: #eef2ff;
      scroll-behavior: smooth;
    }

    /* custom brand variables */
    :root {
      --navy: #1d085e;
      --teal: #13d6c1;
      --teal-dark: #0a9a88;
      --bg-light: #f4f5f8;
      --navy-dark-bg: #09071a;
      --card-bg: #0d0b1e;
      --border-light: #1e1e38;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #0d0b1e;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--teal);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--teal-dark);
    }

    /* glassmorphic refinements for cards - updated brand */
    .brand-card {
      background: #0d0b1e;
      border: 1px solid #1e1e38;
      border-radius: 1.5rem;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .brand-card:hover {
      border-color: var(--teal);
      box-shadow: 0 12px 28px rgba(19,214,193,0.18);
      transform: translateY(-2px);
    }

    /* gradient pattern + grid pattern for hero (brand specific) */
    .hero-gradient {
      background: linear-gradient(135deg, #0d0430, #1d085e, #0d3b38);
      position: relative;
      overflow: hidden;
    }
    .hero-gradient::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(19,214,193,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* button primary style */
    .btn-primary {
      background-color: #1d085e;
      border: none;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      transition: all 0.2s;
      color: white;
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
    }
    .btn-primary:hover {
      background-color: #0a9a88;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(19,214,193,0.3);
    }

    /* badge / chip brand style */
    .brand-chip {
      font-family: 'DM Mono', monospace;
      background: rgba(19,214,193,0.12);
      border: 1px solid rgba(19,214,193,0.35);
      color: #13d6c1;
      border-radius: 9999px;
      padding: 0.25rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      backdrop-filter: blur(2px);
    }

    /* headings: DM Serif Display */
    h1, h2, h3, .serif-heading {
      font-family: 'DM Serif Display', serif;
    }

    /* custom floating animation */
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* override any inline generic gradient */
    .no-purple {
      /* safety */
    }
    .gradient-text-brand {
      background: linear-gradient(135deg, #13d6c1 0%, #1d085e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* adjust footer navy */
    .footer-brand {
      background-color: #05021a;
      border-top: 1px solid #1e1e38;
    }
  </style>
  <style>
    /* ensure tailwind overrides respect brand */
    .bg-gradient-to-br.from-blue-50, .bg-blue-50, .bg-emerald-50, .bg-amber-50, .bg-violet-50, .from-blue-50, .to-emerald-50 {
      /* override any leftover background from old classes - we'll replace in components */
    }
    .glass { backdrop-filter: blur(10px); }
  </style>
</head>
<body class="min-h-screen bg-[#09071a] font-['DM_Sans'] antialiased">

  <!-- Header (Hero) with brand gradient, grid pattern, teal accents -->
  <header class="hero-gradient relative overflow-hidden">
    <div class="relative max-w-6xl mx-auto px-6 py-16 md:py-20 z-10">
      <a href="https://valescabravo.github.io/" class="inline-flex items-center text-sm text-teal-300 hover:text-teal-200 mb-6 transition-colors font-mono tracking-wide">
        ← Back to Portfolio
      </a>
       <a href="https://valescabravo.github.io/lab" class="inline-flex items-center text-sm text-teal-300 hover:text-teal-200 mb-6 transition-colors font-mono tracking-wide">
        ← Back to the Lab
      </a>
      <div class="text-center">
        <h1 class="text-5xl md:text-7xl font-black text-white mb-6 leading-tight serif-heading">
          Attribution & 
          <span class="block bg-gradient-to-r from-teal-300 via-teal-400 to-white bg-clip-text text-transparent">
            Mix Modeling
          </span>
        </h1>
        <p class="text-xl md:text-2xl text-teal-100/90 mb-8 max-w-4xl mx-auto font-light">
          Master the two pillars of modern marketing measurement through 
          <span class="text-teal-300 font-semibold">interactive learning</span> and real-world examples
        </p>
        <div class="flex flex-wrap justify-center gap-4">
          <span class="brand-chip backdrop-blur-sm">🎯 Multi-Touch Attribution</span>
          <span class="brand-chip backdrop-blur-sm">📊 Marketing Mix Modeling</span>
          <span class="brand-chip backdrop-blur-sm">⚡ Interactive Learning</span>
        </div>
      </div>
    </div>
    <!-- decorative teal accents subtle -->
    <div class="hidden sm:block absolute top-20 left-10 w-28 h-28 bg-teal-500/10 rounded-full blur-3xl"></div>
    <div class="hidden sm:block absolute bottom-20 right-10 w-40 h-40 bg-[#1d085e]/40 rounded-full blur-3xl"></div>
  </header>

  <main id="app" class="max-w-6xl mx-auto px-6 pb-20 mt-12"></main>

  <!-- Footer brand consistent -->
  <footer class="footer-brand py-8 mt-12 border-t border-[#1e1e38]">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <p class="text-gray-400 text-sm font-mono tracking-wide">© 2026 Valesca Bravo — Interactive Lab</p>
    </div>
  </footer>

  <script type="text/babel">
    const { useState } = React;

    // ----- BRANDED CARD (replaces old glass gradients) ----------
    const Card = ({ title, children, accent = 'teal', className = '', expandable = false, defaultExpanded = true }) => {
      const [isExpanded, setIsExpanded] = useState(defaultExpanded);
      
      // map accent to brand border colors (teal focus)
      const accentBorder = {
        teal: 'border-teal-500',
        blue: 'border-teal-500',    // unify with teal family
        emerald: 'border-teal-400',
        violet: 'border-teal-400',
        amber: 'border-teal-500',
        rose: 'border-teal-400'
      };
      
      return (
        <div className={`bg-[#0d0b1e] border ${accentBorder[accent] || 'border-teal-500'} rounded-2xl shadow-xl transition-all duration-300 hover:shadow-[0_12px_28px_rgba(19,214,193,0.18)] hover:border-teal-400 ${className}`}>
          <div className={`p-6 ${expandable ? 'cursor-pointer' : ''}`} onClick={expandable ? () => setIsExpanded(!isExpanded) : undefined}>
            <div className="flex items-center justify-between">
              <h3 className="text-xl font-semibold text-white serif-heading tracking-wide">{title}</h3>
              {expandable && (
                <svg className={`w-6 h-6 text-teal-400 transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}`} fill="currentColor" viewBox="0 0 20 20">
                  <path fillRule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clipRule="evenodd" />
                </svg>
              )}
            </div>
          </div>
          {(!expandable || isExpanded) && (
            <div className="px-6 pb-6 text-gray-200 font-light">
              {children}
            </div>
          )}
        </div>
      );
    };

    // Step Navigation (branded with teal / navy)
    const StepNavigation = ({ steps, activeStep, onStepChange, progress }) => (
      <div className="sticky top-4 z-20 mb-8">
        <div className="bg-[#0d0b1e]/90 backdrop-blur-md rounded-2xl p-4 shadow-lg border border-[#1e1e38]">
          <div className="flex flex-wrap gap-2 mb-4">
            {steps.map((step, index) => (
              <button
                key={index}
                onClick={() => onStepChange(index + 1)}
                className={`px-4 py-2 rounded-full text-sm font-mono transition-all duration-200 ${
                  activeStep === index + 1
                    ? 'bg-[#1d085e] text-white shadow-md border border-teal-500'
                    : 'bg-[#0f0c23] text-teal-200 hover:bg-[#1d085e]/80 border border-[#2a2a4a]'
                }`}
              >
                <span className="font-bold mr-1">{index + 1}.</span>
                {step.title}
              </button>
            ))}
          </div>
          <div className="w-full bg-[#1e1e38] rounded-full h-2">
            <div 
              className="bg-gradient-to-r from-teal-400 to-teal-600 h-2 rounded-full transition-all duration-500"
              style={{ width: `${progress}%` }}
            ></div>
          </div>
          <div className="flex justify-between text-xs text-teal-300 font-mono mt-1">
            <span>Step {activeStep} of {steps.length}</span>
            <span>{Math.round(progress)}% Complete</span>
          </div>
        </div>
      </div>
    );

    // AttributionChart (branded colors: teal, navy accents)
    const AttributionChart = ({ model, onModelChange }) => {
      const models = {
        linear: { data: [25, 25, 25, 25], label: 'Linear Attribution', desc: 'Equal credit to all touchpoints in the customer journey' },
        decay: { data: [10, 20, 30, 40], label: 'Time Decay', desc: 'More credit to touchpoints closer to conversion' },
        position: { data: [40, 15, 15, 30], label: 'Position-Based (U-Shape)', desc: 'More credit to first and last touchpoints' },
        last: { data: [0, 0, 0, 100], label: 'Last Click', desc: 'All credit goes to the final touchpoint before conversion' },
        first: { data: [100, 0, 0, 0], label: 'First Click', desc: 'All credit goes to the first touchpoint in the journey' },
        data_driven: { data: [30, 20, 25, 25], label: 'Data-Driven', desc: 'Uses machine learning to assign credit based on actual conversion patterns' }
      };

      const colors = ['bg-teal-500', 'bg-emerald-600', 'bg-[#1d085e]', 'bg-teal-400'];
      const currentModel = models[model] || models.linear;

      return (
        <div className="bg-[#0f0c22] rounded-xl p-6 border border-[#2a2a4a] shadow-sm">
          <div className="mb-6">
            <h4 className="font-semibold text-lg text-white">Attribution Models Comparison</h4>
            <p className="text-sm text-gray-300 mb-4">Select different attribution models to see how credit is distributed across the customer journey</p>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
              {Object.keys(models).map((key) => (
                <button
                  key={key}
                  onClick={() => onModelChange(key)}
                  className={`px-3 py-2 rounded-lg text-xs font-mono transition-all ${
                    model === key
                      ? 'bg-[#1d085e] text-teal-300 border border-teal-500 shadow-md'
                      : 'bg-[#191b2f] text-gray-300 hover:bg-[#1d085e]/60 border border-[#2e2e4a]'
                  }`}
                >
                  {models[key].label}
                </button>
              ))}
            </div>
          </div>
          <div className="mb-6">
            <h5 className="text-sm font-medium text-gray-200 mb-3">Customer Journey: Awareness → Consideration → Intent → Conversion</h5>
            <div className="flex gap-3 h-40 items-end bg-gradient-to-t from-[#0a0820] to-[#14122c] rounded-lg p-4 border border-[#2a2a4a]">
              {currentModel.data.map((value, index) => (
                <div key={index} className="flex-1 flex flex-col items-center">
                  <div
                    className={`w-full ${colors[index]} rounded-t transition-all duration-700 flex items-end justify-center text-white text-sm font-semibold relative group`}
                    style={{ height: `${Math.max(value * 1.5, 8)}px` }}
                  >
                    {value > 0 && (
                      <span className="absolute -top-6 text-teal-200 text-xs font-bold">{value}%</span>
                    )}
                    <div className="absolute -bottom-8 text-xs text-gray-300 text-center w-full">
                      {['Awareness', 'Consideration', 'Intent', 'Conversion'][index]}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-[#1d085e]/30 rounded-lg p-4 border border-teal-500/40">
            <div className="flex items-start gap-3">
              <div className="w-2 h-2 bg-teal-400 rounded-full mt-2 flex-shrink-0"></div>
              <div>
                <p className="font-medium text-teal-300">{currentModel.label}</p>
                <p className="text-sm text-gray-200">{currentModel.desc}</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // MMM Visualization (with brand colors)
    const MMMVisualization = () => {
      const [selectedComponent, setSelectedComponent] = useState('media');
      const components = {
        media: { title: 'Media Spend', description: 'Investment across different marketing channels and their effectiveness over time', examples: ['TV advertising', 'Digital campaigns', 'Radio spots', 'Out-of-home advertising'], color: 'bg-teal-500' },
        base: { title: 'Base vs Incremental', description: 'Separating organic business growth from marketing-driven incremental sales', examples: ['Brand strength', 'Product quality', 'Distribution', 'Word-of-mouth'], color: 'bg-emerald-500' },
        external: { title: 'External Factors', description: 'Environmental variables that influence business performance beyond marketing', examples: ['Seasonality', 'Economic conditions', 'Competitor activity', 'Weather'], color: 'bg-[#1d085e]' },
        adstock: { title: 'Adstock & Saturation', description: 'How advertising effects decay over time and reach diminishing returns', examples: ['Memory decay', 'Saturation curves', 'Carryover effects', 'Diminishing returns'], color: 'bg-amber-600' }
      };
      return (
        <div className="bg-[#0f0c22] rounded-xl p-6 border border-[#2a2a4a] shadow-sm">
          <h4 className="font-semibold text-lg text-white mb-4">MMM Components Explorer</h4>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6">
            {Object.keys(components).map((key) => (
              <button key={key} onClick={() => setSelectedComponent(key)} className={`p-3 rounded-lg text-sm font-mono transition-all ${selectedComponent === key ? `${components[key].color} text-white shadow-md border border-teal-400` : 'bg-[#191b2f] text-gray-300 hover:bg-[#1d085e] border border-[#2e2e4a]'}`}>
                {components[key].title}
              </button>
            ))}
          </div>
          <div className="bg-[#0a0820] rounded-lg p-4 border border-[#2e2e50]">
            <h5 className="font-semibold text-teal-200 mb-2">{components[selectedComponent].title}</h5>
            <p className="text-gray-200 mb-3">{components[selectedComponent].description}</p>
            <div className="grid grid-cols-2 gap-2">
              {components[selectedComponent].examples.map((example, index) => (
                <div key={index} className="flex items-center gap-2 text-sm text-gray-300"><div className={`w-2 h-2 ${components[selectedComponent].color} rounded-full`}></div><span>{example}</span></div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // Comparison Framework brand update
    const ComparisonFramework = () => {
      const [activeComparison, setActiveComparison] = useState('overview');
      const comparisons = {
        overview: { title: 'Overview Comparison', mta: { strength: 'Granular, real-time insights', weakness: 'Privacy limitations, digital-only focus', useCase: 'Campaign optimization' }, mmm: { strength: 'Holistic view, privacy-safe', weakness: 'Less granular', useCase: 'Strategic planning' } },
        data: { title: 'Data Requirements', mta: { strength: 'Individual user interactions', weakness: 'Requires consent', useCase: 'Real-time adjustments' }, mmm: { strength: 'Aggregated data', weakness: 'Needs 2+ years data', useCase: 'Long-term insights' } },
        implementation: { title: 'Implementation', mta: { strength: 'Faster setup', weakness: 'Privacy compliance costs', useCase: 'Quick wins' }, mmm: { strength: 'Long-term value', weakness: 'Higher upfront investment', useCase: 'Sustainable framework' } }
      };
      const current = comparisons[activeComparison];
      return (
        <div className="bg-[#0f0c22] rounded-xl p-6 border border-[#2a2a4a]">
          <h4 className="font-semibold text-lg text-white mb-4">MTA vs MMM Comparison</h4>
          <div className="flex flex-wrap gap-2 mb-6">
            {Object.keys(comparisons).map((key) => (<button key={key} onClick={() => setActiveComparison(key)} className={`px-4 py-2 rounded-lg text-sm font-mono transition-all ${activeComparison === key ? 'bg-[#1d085e] text-teal-300 border border-teal-500' : 'bg-[#191b2f] text-gray-300 border border-[#2e2e4a]'}`}>{comparisons[key].title}</button>))}
          </div>
          <div className="grid md:grid-cols-2 gap-6">
            <div className="bg-[#1d085e]/20 rounded-lg p-4 border border-teal-500/30"><div className="flex items-center gap-2 mb-3"><div className="w-4 h-4 bg-teal-500 rounded"></div><h5 className="font-semibold text-teal-200">Multi-Touch Attribution</h5></div><div className="space-y-2 text-sm"><div><span className="font-medium text-green-400">✓ Strengths: </span><span className="text-gray-200">{current.mta.strength}</span></div><div><span className="font-medium text-red-400">⚠ Considerations: </span><span className="text-gray-200">{current.mta.weakness}</span></div><div><span className="font-medium text-teal-300">🎯 Best for: </span><span className="text-gray-200">{current.mta.useCase}</span></div></div></div>
            <div className="bg-teal-900/20 rounded-lg p-4 border border-teal-500/30"><div className="flex items-center gap-2 mb-3"><div className="w-4 h-4 bg-emerald-500 rounded"></div><h5 className="font-semibold text-emerald-300">Marketing Mix Modeling</h5></div><div className="space-y-2 text-sm"><div><span className="font-medium text-green-400">✓ Strengths: </span><span className="text-gray-200">{current.mmm.strength}</span></div><div><span className="font-medium text-red-400">⚠ Considerations: </span><span className="text-gray-200">{current.mmm.weakness}</span></div><div><span className="font-medium text-emerald-300">🎯 Best for: </span><span className="text-gray-200">{current.mmm.useCase}</span></div></div></div>
          </div>
        </div>
      );
    };

    // ResourcePanel (branded)
    const ResourcePanel = ({ type, resources, accent = 'teal' }) => {
      const [activeResource, setActiveResource] = useState(null);
      const icons = { tool: (<svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z" /></svg>), practice: (<svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>), tip: (<svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" /></svg>) };
      return (<div className="space-y-3"><h4 className={`font-semibold text-teal-300 flex items-center gap-2 font-mono`}>{icons[type]}{type === 'tool' ? 'Tools & Platforms' : type === 'tip' ? 'Pro Tips' : 'Best Practices'}</h4><div className="space-y-2">{resources.map((resource, index) => (<div key={index}><button onClick={() => setActiveResource(activeResource === index ? null : index)} className="w-full text-left p-3 bg-[#14122c] rounded-lg border border-[#2a2a4a] hover:border-teal-500 transition-all"><div className="flex items-center justify-between"><span className="font-medium text-gray-100">{resource.title}</span><svg className={`w-4 h-4 text-teal-400 transition-transform ${activeResource === index ? 'rotate-180' : ''}`} fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clipRule="evenodd" /></svg></div></button>{activeResource === index && (<div className="mt-2 p-4 bg-[#0a0820] rounded-lg border-l-4 border-teal-500"><p className="text-sm text-gray-200 mb-2">{resource.description}</p>{resource.link && (<a href={resource.link} target="_blank" rel="noopener noreferrer" className="text-teal-400 text-sm hover:underline inline-flex items-center gap-1">Learn more <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"></path><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"></path></svg></a>)}</div>)}</div>))}</div></div>);
    };

    // Main App (preserving exact content sections, logic, tabs, steps)
    function App() {
      const [activeStep, setActiveStep] = useState(1);
      const [attributionModel, setAttributionModel] = useState('linear');
      const steps = [{ title: 'Overview & Challenges' }, { title: 'Multi-Touch Attribution' }, { title: 'Marketing Mix Modeling' }, { title: 'Comparison & Integration' }, { title: 'Tools & Implementation' }];

ext-gray-300">Holistic, top-down statistical analysis</div></div></div></div></div></div></div></Card></div>)}

zed naming conventions." }]} /></Card></div></div>)}
